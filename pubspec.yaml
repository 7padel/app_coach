name: padel_coach
description: "7Padel Coach App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.3+1
  qr_flutter: ^4.1.0
  dotted_border: ^2.0.0
  lottie: ^3.1.2
  fluttertoast: ^8.1.1
  intl: ^0.19.0
  intl_phone_field: ^3.2.0
  flutter_svg: ^2.0.0
  pin_code_fields: ^8.0.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.0
  shared_preferences: ^2.0.15
  event_bus: ^2.0.1
  image_picker: ^1.1.2
  provider: ^6.1.1
  url_launcher: ^6.3.1
  app_links: ^6.4.0
  logger: ^2.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
   - images/
  fonts:
     - family: HelveticaNeue
       fonts:
         - asset: fonts/HelveticaNeueLight.otf
         - asset: fonts/HelveticaNeueMedium.otf
         - asset: fonts/HelveticaNeueBold.otf
